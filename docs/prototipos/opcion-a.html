<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Opción A · Explorador — Prototipo Descubre Bareyo</title>
<link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
:root{--brand:#14532d;--brand-2:#16a34a;--ink:#1c2321;--surface:#fff;--muted:#6b7280;--chip-bg:#ffffff;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.14)}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
html,body{height:100%;overflow:hidden}
#map{position:absolute;inset:0}
.proto-tag{position:fixed;bottom:8px;left:8px;z-index:50;background:#111c;color:#fff;font-size:11px;padding:4px 10px;border-radius:999px;backdrop-filter:blur(4px)}
/* ── Cabecera: búsqueda + idioma ── */
.topbar{position:fixed;top:12px;left:12px;right:12px;z-index:30;display:flex;gap:8px;align-items:center}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface);border-radius:999px;padding:12px 18px;box-shadow:var(--shadow);color:var(--muted);font-size:15px;border:none;cursor:text}
.search svg{flex:none}
.lang-btn{width:46px;height:46px;border-radius:50%;border:none;background:var(--surface);box-shadow:var(--shadow);font-size:22px;cursor:pointer;display:grid;place-items:center}
.lang-pop{position:fixed;top:66px;right:12px;z-index:40;background:var(--surface);border-radius:var(--radius);box-shadow:0 8px 30px rgba(0,0,0,.22);padding:6px;min-width:190px;display:none}
.lang-pop.open{display:block}
.lang-row{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border:none;background:none;border-radius:10px;font-size:15px;cursor:pointer;color:var(--ink)}
.lang-row:hover{background:#f0fdf4}
.lang-row .chk{margin-left:auto;color:var(--brand-2);font-weight:700;opacity:0}
.lang-row.active .chk{opacity:1}
/* ── Chips de categoría ── */
.chips{position:fixed;top:68px;left:0;right:0;z-index:25;display:flex;gap:8px;padding:6px 12px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;display:flex;align-items:center;gap:6px;background:var(--chip-bg);border:1.5px solid transparent;border-radius:999px;padding:9px 15px;font-size:14px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;transition:.15s}
.chip.active{background:var(--brand);color:#fff}
/* ── Controles derecha ── */
.side{position:fixed;right:12px;top:132px;z-index:25;display:flex;flex-direction:column;gap:8px}
.side button{width:46px;height:46px;border-radius:12px;border:none;background:var(--surface);box-shadow:var(--shadow);cursor:pointer;display:grid;place-items:center;color:var(--ink)}
.side button.on{background:var(--brand);color:#fff}
.side .badge{position:absolute;top:-4px;right:-4px;background:var(--brand-2);color:#fff;font-size:10px;font-weight:700;border-radius:999px;padding:2px 5px;display:none}
/* ── Contador resultados ── */
.count{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;z-index:25;background:#111d;color:#fff;padding:10px 20px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:var(--shadow);backdrop-filter:blur(6px)}
/* ── Bottom sheet Capas ── */
.sheet-back{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:.25s}
.sheet-back.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--surface);border-radius:22px 22px 0 0;padding:10px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(105%);transition:.28s cubic-bezier(.3,.9,.3,1);max-height:78vh;overflow-y:auto}
.sheet-back.open .sheet{transform:none}
.sheet h2{font-size:17px;margin:10px 0 14px;color:var(--ink)}
.sheet .grab{width:40px;height:4px;border-radius:2px;background:#d1d5db;margin:2px auto 4px}
.sheet h3{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:16px 0 10px}
.base-row{display:flex;gap:12px}
.base-card{flex:1;border:2.5px solid #e5e7eb;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:none;padding:0;text-align:center}
.base-card.active{border-color:var(--brand-2)}
.base-card .thumb{height:70px;background-size:cover;background-position:center}
.base-card span{display:block;font-size:13px;font-weight:600;padding:7px;color:var(--ink)}
.layer-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.layer-row:last-child{border:none}
.layer-thumb{width:64px;height:44px;border-radius:10px;background-size:cover;background-position:center;flex:none;background-color:#e5e7eb;display:grid;place-items:center;font-size:22px}
.layer-txt{flex:1}
.layer-txt b{display:block;font-size:15px;color:var(--ink)}
.layer-txt small{color:var(--muted);font-size:12.5px}
.sw{position:relative;width:46px;height:27px;flex:none;border-radius:999px;background:#d1d5db;border:none;cursor:pointer;transition:.2s}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw.on{background:var(--brand-2)}
.sw.on::after{left:22px}
.f360-marker{width:12px;height:12px;border-radius:50%;background:#2f7fa8;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.f360-marker.drone{background:#e11d48}
.poi{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--pc,#6366F1);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.35);font-size:16px;cursor:pointer}
</style>
</head>
<body>
<div id="map"></div>
<div class="proto-tag">Prototipo A · Explorador (AllTrails / Strava)</div>

<div class="topbar">
  <button class="search" aria-label="Buscar"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><span data-t="search">Buscar en Bareyo, Ajo y Güemes…</span></button>
  <button class="lang-btn" id="langBtn" aria-haspopup="true" aria-expanded="false" title="Idioma">🇪🇸</button>
</div>
<div class="lang-pop" id="langPop" role="menu">
  <button class="lang-row active" data-lang="es">🇪🇸 Español<span class="chk">✓</span></button>
  <button class="lang-row" data-lang="en">🇬🇧 English<span class="chk">✓</span></button>
  <button class="lang-row" data-lang="fr">🇫🇷 Français<span class="chk">✓</span></button>
  <button class="lang-row" data-lang="de">🇩🇪 Deutsch<span class="chk">✓</span></button>
</div>

<div class="chips" id="chips"></div>

<div class="side">
  <button id="btnLoc" title="Mi ubicación"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></button>
  <button id="btn3d" title="3D"><b style="font-size:13px">3D</b></button>
  <button id="btnLayers" title="Capas" style="position:relative"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span class="badge" id="layerBadge">2</span></button>
</div>

<div class="count" id="count">96 <span data-t="results">resultados</span></div>

<div class="sheet-back" id="sheetBack">
  <div class="sheet" role="dialog" aria-label="Capas del mapa">
    <div class="grab"></div>
    <h2 data-t="layersTitle">Capas del mapa</h2>
    <h3 data-t="baseTitle">Mapa base</h3>
    <div class="base-row">
      <button class="base-card active" id="baseMap"><div class="thumb" style="background-image:url('https://basemaps.cartocdn.com/rastertiles/voyager/13/2007/3021.png')"></div><span data-t="baseMap">Mapa</span></button>
      <button class="base-card" id="baseSat"><div class="thumb" style="background-image:url('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/13/3021/2007')"></div><span data-t="baseSat">Satélite</span></button>
    </div>
    <h3 data-t="overlayTitle">Capas</h3>
    <div class="layer-row">
      <div class="layer-thumb" id="f360Thumb">📷</div>
      <div class="layer-txt"><b data-t="l360">Fotos 360°</b><small id="f360Count" data-t="l360d">Miniaturas reales por todo el municipio</small></div>
      <button class="sw" id="swF360" role="switch" aria-checked="false"></button>
    </div>
    <div class="layer-row">
      <div class="layer-thumb">🥾</div>
      <div class="layer-txt"><b data-t="lRutas">Rutas de senderismo</b><small data-t="lRutasd">6 rutas con GPX y altimetría</small></div>
      <button class="sw on" id="swRutas" role="switch" aria-checked="true"></button>
    </div>
    <div class="layer-row">
      <div class="layer-thumb">⛪</div>
      <div class="layer-txt"><b data-t="lPatri">Patrimonio</b><small data-t="lPatrid">Iglesias, faro, molino…</small></div>
      <button class="sw on" id="swPatri" role="switch" aria-checked="true"></button>
    </div>
    <div class="layer-row">
      <div class="layer-thumb">🧊</div>
      <div class="layer-txt"><b data-t="l3d">Tours 3D</b><small data-t="l3dd">6 interiores Matterport</small></div>
      <button class="sw" id="sw3d" role="switch" aria-checked="false"></button>
    </div>
  </div>
</div>

<script src="../../data.js"></script>
<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script>
const I18N={
 es:{search:'Buscar en Bareyo, Ajo y Güemes…',results:'resultados',layersTitle:'Capas del mapa',baseTitle:'Mapa base',baseMap:'Mapa',baseSat:'Satélite',overlayTitle:'Capas',l360:'Fotos 360°',l360d:'Miniaturas reales por todo el municipio',lRutas:'Rutas de senderismo',lRutasd:'6 rutas con GPX y altimetría',lPatri:'Patrimonio',lPatrid:'Iglesias, faro, molino…',l3d:'Tours 3D',l3dd:'6 interiores Matterport'},
 en:{search:'Search Bareyo, Ajo & Güemes…',results:'results',layersTitle:'Map layers',baseTitle:'Base map',baseMap:'Map',baseSat:'Satellite',overlayTitle:'Layers',l360:'360° photos',l360d:'Real thumbnails across the town',lRutas:'Hiking routes',lRutasd:'6 routes with GPX & elevation',lPatri:'Heritage',lPatrid:'Churches, lighthouse, mill…',l3d:'3D tours',l3dd:'6 Matterport interiors'},
 fr:{search:'Chercher à Bareyo, Ajo, Güemes…',results:'résultats',layersTitle:'Couches de la carte',baseTitle:'Fond de carte',baseMap:'Carte',baseSat:'Satellite',overlayTitle:'Couches',l360:'Photos 360°',l360d:'Vignettes réelles de la commune',lRutas:'Sentiers de randonnée',lRutasd:'6 itinéraires GPX + dénivelé',lPatri:'Patrimoine',lPatrid:'Églises, phare, moulin…',l3d:'Visites 3D',l3dd:'6 intérieurs Matterport'},
 de:{search:'In Bareyo, Ajo & Güemes suchen…',results:'Ergebnisse',layersTitle:'Kartenebenen',baseTitle:'Basiskarte',baseMap:'Karte',baseSat:'Satellit',overlayTitle:'Ebenen',l360:'360°-Fotos',l360d:'Echte Vorschaubilder der Gemeinde',lRutas:'Wanderwege',lRutasd:'6 Routen mit GPX & Höhenprofil',lPatri:'Kulturerbe',lPatrid:'Kirchen, Leuchtturm, Mühle…',l3d:'3D-Touren',l3dd:'6 Matterport-Innenräume'}};
const FLAGS={es:'🇪🇸',en:'🇬🇧',fr:'🇫🇷',de:'🇩🇪'};
let lang='es';
function applyLang(l){lang=l;document.querySelectorAll('[data-t]').forEach(n=>{const k=n.dataset.t;if(I18N[l][k])n.textContent=I18N[l][k];});
 document.getElementById('langBtn').textContent=FLAGS[l];
 document.querySelectorAll('.lang-row').forEach(r=>r.classList.toggle('active',r.dataset.lang===l));
 renderChips();}

const map=new maplibregl.Map({container:'map',style:'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',center:CONFIG.center,zoom:12.2,attributionControl:{compact:true}});
let markers=[],f360Markers=[],activeCat='all';
const CHIP_LABELS={es:{all:'Todo',hiking:'Rutas',costa:'Patrimonio',alojamiento:'Dormir',restauracion:'Comer',comercio:'Compras',surf:'Surf & Ocio'},
 en:{all:'All',hiking:'Trails',costa:'Heritage',alojamiento:'Sleep',restauracion:'Eat',comercio:'Shops',surf:'Surf & Fun'},
 fr:{all:'Tout',hiking:'Sentiers',costa:'Patrimoine',alojamiento:'Dormir',restauracion:'Manger',comercio:'Boutiques',surf:'Surf'},
 de:{all:'Alles',hiking:'Wege',costa:'Erbe',alojamiento:'Schlafen',restauracion:'Essen',comercio:'Läden',surf:'Surf'}};
const CHIP_EMOJI={all:'📍',hiking:'🥾',costa:'⛪',alojamiento:'🏨',restauracion:'🍽️',comercio:'🛒',surf:'🏄'};

function renderChips(){const c=document.getElementById('chips');c.innerHTML='';
 Object.keys(CHIP_EMOJI).forEach(k=>{const b=document.createElement('button');b.className='chip'+(k===activeCat?' active':'');
  b.innerHTML=CHIP_EMOJI[k]+' '+CHIP_LABELS[lang][k];b.onclick=()=>{activeCat=k;renderChips();renderMarkers();};c.appendChild(b);});}

function mk(lngLat,emoji,color,title){const el=document.createElement('div');el.className='poi';el.style.setProperty('--pc',color);el.textContent=emoji;el.title=title;
 const m=new maplibregl.Marker({element:el}).setLngLat(lngLat).addTo(map);markers.push(m);}
function renderMarkers(){markers.forEach(m=>m.remove());markers=[];let n=0;
 const showRutas=document.getElementById('swRutas').classList.contains('on');
 const showPatri=document.getElementById('swPatri').classList.contains('on');
 const show3d=document.getElementById('sw3d').classList.contains('on');
 if((activeCat==='all'||activeCat==='hiking')&&showRutas)hikingRoutes.forEach(r=>{mk(r.coords[0],'🥾','#166534',r.name);n++;});
 if((activeCat==='all'||activeCat==='costa')&&showPatri)costaPoints.forEach(p=>{mk(p.coords,'⛪','#7c3aed',p.name);n++;});
 if(activeCat==='all'&&show3d)points3D.forEach(p=>{mk(p.coords,'🧊','#0e7490',p.name);n++;});
 businesses.forEach(b=>{if(activeCat==='all'||b.category===activeCat){if(['hiking','costa'].includes(activeCat))return;
  mk(b.coords,(BUSINESS_CATEGORIES[b.category]||{}).emoji||'📍',(BUSINESS_CATEGORIES[b.category]||{}).color||'#6366F1',b.name);n++;}});
 document.getElementById('count').firstChild.textContent=n+' ';}

let f360Data=null;
async function toggleF360(on){if(on&&!f360Data){const r=await fetch('../../assets/data/fotos360.geojson');f360Data=await r.json();
  document.getElementById('f360Count').textContent=f360Data.features.length.toLocaleString('es')+' fotos · azul a pie · rojo dron';}
 f360Markers.forEach(m=>m.remove());f360Markers=[];
 if(on&&f360Data){f360Data.features.filter((_,i)=>i%12===0).forEach(f=>{const el=document.createElement('div');
  el.className='f360-marker'+(f.properties.drone?' drone':'');
  f360Markers.push(new maplibregl.Marker({element:el}).setLngLat(f.geometry.coordinates).addTo(map));});}}

document.getElementById('langBtn').onclick=e=>{e.stopPropagation();document.getElementById('langPop').classList.toggle('open');};
document.addEventListener('click',()=>document.getElementById('langPop').classList.remove('open'));
document.querySelectorAll('.lang-row').forEach(r=>r.onclick=()=>applyLang(r.dataset.lang));
document.getElementById('btnLayers').onclick=()=>document.getElementById('sheetBack').classList.add('open');
document.getElementById('sheetBack').onclick=e=>{if(e.target.id==='sheetBack')e.target.classList.remove('open');};
document.querySelectorAll('.sw').forEach(sw=>sw.onclick=()=>{sw.classList.toggle('on');sw.setAttribute('aria-checked',sw.classList.contains('on'));
 if(sw.id==='swF360')toggleF360(sw.classList.contains('on'));else renderMarkers();
 const nOn=[...document.querySelectorAll('.sw')].filter(s=>s.classList.contains('on')).length;
 const b=document.getElementById('layerBadge');b.textContent=nOn;b.style.display=nOn?'block':'none';});
document.getElementById('baseMap').onclick=()=>{setBase('map');};
document.getElementById('baseSat').onclick=()=>{setBase('sat');};
function setBase(k){document.getElementById('baseMap').classList.toggle('active',k==='map');document.getElementById('baseSat').classList.toggle('active',k==='sat');
 map.setStyle(k==='map'?'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json':{version:8,sources:{sat:{type:'raster',tiles:['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'],tileSize:256}},layers:[{id:'sat',type:'raster',source:'sat'}]});}
document.getElementById('btn3d').onclick=e=>{const on=e.currentTarget.classList.toggle('on');map.easeTo({pitch:on?55:0});};
document.getElementById('btnLoc').onclick=()=>map.flyTo({center:CONFIG.center,zoom:13});
const nOn0=document.getElementById('layerBadge');nOn0.textContent='2';nOn0.style.display='block';
map.on('load',()=>{renderChips();renderMarkers();});
</script>
</body>
</html>
