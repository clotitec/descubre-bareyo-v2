name: Actualizar agenda (aytobareyo.org)

# Baja noticias/actividades del Ayuntamiento de Bareyo (WordPress REST público) a events.json.
# Commitea SOLO si hay cambios reales → Vercel auto-despliega. Proyecto sigue 100% estático.
# Las redes sociales NO se ingieren (requieren tokens del cliente). Ver scripts/fetch-events.mjs.

on:
  schedule:
    - cron: '0 6 * * *'      # 06:00 UTC (~08:00 Madrid) cada día
  workflow_dispatch: {}        # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write              # para commitear events.json

concurrency:
  group: eventos
  cancel-in-progress: false

jobs:
  events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bajar eventos de aytobareyo.org
        run: node scripts/fetch-events.mjs

      - name: Validar JSON
        run: node -e "JSON.parse(require('fs').readFileSync('events.json','utf8')); console.log('events.json OK')"

      - name: Commitear si hay cambios
        run: |
          if [[ -n "$(git status --porcelain events.json)" ]]; then
            git config user.name "bareyo-eventos-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add events.json
            git commit -m "chore(eventos): actualizar agenda desde aytobareyo.org"
            git push
            echo "events.json actualizado y commiteado."
          else
            echo "Sin cambios en events.json — no se commitea."
          fi
