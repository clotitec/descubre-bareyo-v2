name: Check syntax & integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    name: JS syntax + JSON validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # historia completa para el guard de CACHE_VERSION

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate all JS files
        run: |
          set -e
          echo "Checking JS syntax..."
          for f in app.js data.js config.js sw.js js/track.js js/geo.js kiosko.js scripts/fetch-events.mjs; do
            echo "  - $f"
            node --check "$f"
          done
          echo "✓ All JS files OK"

      - name: Validate JSON files
        run: |
          set -e
          echo "Validating JSON files..."
          for f in manifest.json vercel.json; do
            echo "  - $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done
          # Validate GPX/JSON pairs
          for f in assets/tracks/*.json; do
            echo "  - $f"
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done
          echo "✓ All JSON files OK"

      - name: Lint sitemap.xml is well-formed XML
        run: |
          if [ -f sitemap.xml ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq libxml2-utils
            xmllint --noout sitemap.xml
            echo "✓ sitemap.xml is well-formed"
          fi

      - name: Verify config.js has no real keys committed
        run: |
          if grep -E "(SUPABASE_(URL|ANON_KEY).*=.*['\"]http|SUPABASE_(URL|ANON_KEY).*=.*['\"]eyJ)" config.js; then
            echo "::error::Looks like real Supabase URL/key was committed to config.js"
            exit 1
          fi
          echo "✓ config.js placeholders OK"

      - name: Guard — bump CACHE_VERSION when shell files change
        run: |
          # Un cambio en el shell cacheado sin bump de sw.js deja a los clientes recurrentes
          # con una mezcla de versiones (HTML nuevo + JS viejo → ReferenceError). El SW hace SWR,
          # pero el bump es la forma correcta de invalidar. Falla si falta.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"; HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"; HEAD="${{ github.sha }}"
          fi
          if [ -z "$BASE" ] || echo "$BASE" | grep -qE '^0+$' || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "Sin base válida para comparar — se omite el guard."; exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Archivos cambiados:"; echo "$CHANGED"
          SHELL_RE='^(app\.js|data\.js|index\.html|styles\.css|styles-v3\.css|kiosko\.js|kiosko\.html|js/track\.js|offline\.html)$'
          if echo "$CHANGED" | grep -qE "$SHELL_RE"; then
            if echo "$CHANGED" | grep -qx 'sw.js'; then
              echo "✓ sw.js incluido en el diff — se asume bump de CACHE_VERSION"
            else
              echo "::error::Cambias archivos del shell cacheado sin tocar sw.js. Bumpea CACHE_VERSION en sw.js para invalidar la caché."
              exit 1
            fi
          else
            echo "✓ No cambian archivos del shell cacheado."
          fi

  links:
    name: Sitemap URLs reachable (post-deploy)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: syntax
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel deployment to settle
        run: sleep 60

      - name: Check root URL responds 200
        run: |
          set -e
          URL="https://descubre-bareyo-v2.vercel.app/"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "GET $URL → $STATUS"
          [ "$STATUS" = "200" ] || (echo "::error::Root URL not 200" && exit 1)

      - name: Check sw.js Cache-Control header is no-cache
        run: |
          CC=$(curl -sI "https://descubre-bareyo-v2.vercel.app/sw.js" | grep -i "cache-control" | tr -d '\r')
          echo "$CC"
          echo "$CC" | grep -qi "no-cache" || (echo "::error::sw.js missing no-cache" && exit 1)

      - name: Check robots.txt and sitemap.xml respond 200
        run: |
          for path in robots.txt sitemap.xml manifest.json; do
            URL="https://descubre-bareyo-v2.vercel.app/$path"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            echo "GET $URL → $STATUS"
            [ "$STATUS" = "200" ] || (echo "::error::$path not 200" && exit 1)
          done
